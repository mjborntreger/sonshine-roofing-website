# Project-local Codex permissions for SonShine Roofing.
# Keep network domains in sync with the host sources in next.config.mjs CSP.
default_permissions = "sonshine-csp-net"

[features.network_proxy]
enabled = true

[permissions.sonshine-csp-net.filesystem]
":minimal" = "read"
":tmpdir" = "write"
"/bin" = "read"
"/usr/bin" = "read"
"/usr/local/bin" = "read"
"/usr/local/lib/node_modules/npm" = "read"
"/Library/Developer/CommandLineTools" = "read"
"/System/Library/OpenSSL" = "read"

[permissions.sonshine-csp-net.filesystem.":workspace_roots"]
"." = "write"

[permissions.sonshine-csp-net.network]
enabled = true

[permissions.sonshine-csp-net.network.domains]
