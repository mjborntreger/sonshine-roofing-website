version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:30"
      timezone: "America/New_York"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "automated-maintenance"
    commit-message:
      prefix: "deps"
    groups:
      security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"
      routine-updates:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
