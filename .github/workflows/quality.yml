name: Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint and contract checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Verify Directus HTML
        run: npm run verify:directus-html
      - name: Verify FAQ HTML
        run: npm run verify:faq-html
      - name: Verify person HTML
        run: npm run verify:person-html
      - name: Verify person SEO
        run: npm run verify:person-seo
